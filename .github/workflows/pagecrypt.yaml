name: Deploy Protected Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Encrypt and Prepare
        run: |
          # 1. Creamos la carpeta limpia para el despliegue
          mkdir public_site
          
          # 2. Copiamos TODO excepto el index.html original a la carpeta de salida
          # Usamos rsync si está disponible o un cp selectivo
          cp -r assets public_site/ 2>/dev/null || true
          # (Si tienes más carpetas como 'css' o 'js', añádelas aquí)

          # 3. Ciframos el index.html y lo guardamos DIRECTAMENTE en public_site
          # Esto garantiza que el index.html en public_site SEA el cifrado
          npx staticrypt index.html "${{ secrets.PASSWORD }}" -o public_site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

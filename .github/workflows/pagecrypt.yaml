name: Deploy Protected Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Encrypt Index
        run: |
          # 1. Creamos una carpeta temporal
          mkdir out
          
          # 2. Ciframos el index.html original y lo metemos en 'out'
          # Usamos npx para ejecutar staticrypt directamente
          npx staticrypt index.html "${{ secrets.PASSWORD }}" -o out/index.html
          
          # 3. Copiamos tus carpetas de assets/imágenes a 'out' si existen
          # Si no tienes carpetas extra, esto no hará nada malo
          cp -r assets out/ 2>/dev/null || true
          cp -r img out/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

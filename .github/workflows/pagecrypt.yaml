name: Deploy Protected Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Encrypt Index
        # Usamos --n con staticrypt para que no pida confirmación y forzamos el output
        run: |
          npx staticrypt index.html "${{ secrets.PASSWORD }}" -o protected.html
          # Reemplazamos el original por el protegido para que sea el que se suba
          mv protected.html index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Subimos la raíz, donde ahora index.html YA ESTÁ cifrado

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        

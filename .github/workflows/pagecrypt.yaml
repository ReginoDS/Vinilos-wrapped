- name: Encrypt with StatiCrypt
      run: |
        # Creamos una carpeta para el contenido público
        mkdir public
        # Ciframos el index.html y lo guardamos en la carpeta public
        npx staticrypt index.html "${{ secrets.PASSWORD }}" -o public/index.html
        # Copiamos cualquier otro archivo necesario (css, js, imágenes) a public
        # cp -r assets public/  <-- Descomenta si tienes carpetas de assets

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './public'  # IMPORTANTE: Subimos la carpeta con el archivo cifrado

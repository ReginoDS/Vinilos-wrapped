name: Deploy Protected Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: List files  # ← DEBUG: ve qué hay
      run: ls -la

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install and encrypt
      run: |
        npm install -g staticrypt@3.5.1  # ← Versión estable
        npx staticrypt index.html "${{ secrets.PASSWORD }}" index.html \
          --config '{"color":"#000000","backgroundColor":"#ffffff","title":"Acceso restringido"}'
      shell: bash

    - name: Verify output
      run: ls -la index.html*  # ← DEBUG

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3

name: Deploy Protected Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js 16
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Encrypt index.html
      run: |
        npm install -g staticrypt@3.0.0  # ← Versión fija compatible
        npx staticrypt index.html "${{ secrets.PASSWORD }}" index.html \
          --config '{"color":"#000000","backgroundColor":"#ffffff","title":"Acceso restringido"}'

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

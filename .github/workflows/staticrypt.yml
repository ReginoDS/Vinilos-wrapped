    name: Deploy Protected Site

on:
  push:
    branches: ["main"]  # ← EDITA TU RAMA
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Encrypt with PageCrypt
      run: |
        curl -sL https://pagecrypt.greenheartgames.com/pagecrypt-1.2.1.js > pagecrypt.js
        node -e "
          const fs = require('fs');
          const PageCrypt = require('./pagecrypt.js');
          const html = fs.readFileSync('index.html', 'utf8');
          const encrypted = PageCrypt.encrypt(html, process.env.PASS);
          fs.writeFileSync('index.html', encrypted);
        " --env PASS='${{ secrets.PASSWORD }}'

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
